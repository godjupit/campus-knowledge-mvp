<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园知识社区 - 首页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="home">
  <header class="topbar">
    <div class="topbar-inner wrap">
      <a class="brand" href="/home.html">
        <span class="brand-mark"></span>
        <span class="brand-text">CampusHub</span>
      </a>
      <nav class="main-nav">
        <a data-nav="home" href="/home.html">首页</a>
        <a data-nav="profile" href="/profile.html">个人中心</a>
        <a href="/auth.html">登录/注册</a>
      </nav>
      <div class="search">
        <input id="searchInput" placeholder="按标题、内容、标签做前端过滤">
      </div>
      <div class="actions">
        <a id="authLink" class="btn ghost" href="/auth.html">去登录</a>
        <button id="logoutBtn" class="btn ghost hidden" type="button">退出登录</button>
        <a id="avatarLink" class="avatar" href="/profile.html">U</a>
      </div>
    </div>
  </header>

  <main class="wrap grid-home">
    <section class="left-col">
      <div class="compose card">
        <div class="compose-head">
          <span id="composeAvatar" class="avatar tiny">U</span>
          <input id="postTitleInput" placeholder="标题：例如 Spring Boot 登录功能踩坑记录">
          <button id="publishBtn" class="btn primary" type="button">发布帖子</button>
        </div>
        <textarea id="postContentInput" class="compose-textarea" placeholder="内容：记录你的思路、步骤和踩坑点"></textarea>
        <input id="postTagsInput" class="compose-tags" placeholder="标签：例如 springboot,java,mybatis">
        <div class="compose-tools">
          <span>当前已接通：发布帖子</span>
          <span>待你后端完成：评论</span>
          <span>待你后端完成：点赞</span>
          <span>待你后端完成：收藏</span>
        </div>
        <p id="publishMessage" class="page-message"></p>
      </div>

      <div id="feed" class="feed"></div>
    </section>

    <aside class="right-col">
      <div class="card side-card">
        <h3>当前后端进度</h3>
        <div class="stats">
          <div><strong>6</strong><span>已接通接口</span></div>
          <div><strong>3</strong><span>已完成主线模块</span></div>
        </div>
        <p class="muted side-note">当前前端只依赖注册、登录、当前用户、发帖、列表、详情接口。</p>
      </div>

      <div class="card side-card">
        <div class="side-title-row">
          <h3>当前登录状态</h3>
        </div>
        <div id="currentUserCard" class="status-panel">
          <p class="muted">未登录时无法访问当前后端接口。</p>
        </div>
      </div>

      <div class="card side-card">
        <h3>练习提示</h3>
        <ul class="quick-list">
          <li><a href="/profile.html">查看当前用户接口效果</a></li>
          <li><a href="/docs/backend-practice-roadmap.md">按文档推进后端练习</a></li>
          <li><span>搜索、热门、推荐暂不接前端真实请求</span></li>
        </ul>
      </div>
    </aside>
  </main>

  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/home.js"></script>
</body>
</html>
