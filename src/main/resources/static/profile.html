<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">

<body data-page="profile">
  <header class="topbar">
    <div class="topbar-inner wrap">
      <a class="brand" href="/home.html">
        <span class="brand-mark"></span>
        <span class="brand-text">CampusHub</span>
      </a>
      <nav class="main-nav">

  <main class="wrap grid-profile">

      <div class="avatar xl">U</div>

      </div>

    <section class="card profile-content">
      <h2>我的发布</h2>
      <div id="myPosts" class="feed"></div>
    </section>
  </main>

  <script src="/assets/js/data.js"></script>
  <script src="/assets/js/app.js"></script>
