<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 校园知识社区</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="profile">
  <header class="topbar">
    <div class="topbar-inner wrap">
      <a class="brand" href="/home.html">
        <span class="brand-mark"></span>
        <span class="brand-text">CampusHub</span>
      </a>
      <nav class="main-nav">
        <a href="/home.html">首页</a>
        <a data-nav="profile" href="/profile.html">个人中心</a>
        <a href="/auth.html">登录/注册</a>
      </nav>
      <div class="actions">
        <a id="authLink" class="btn ghost" href="/auth.html">去登录</a>
        <button id="logoutBtn" class="btn ghost hidden" type="button">退出登录</button>
        <a id="avatarLink" class="avatar" href="/profile.html">U</a>
      </div>
    </div>
  </header>

  <main class="wrap grid-profile">
    <section class="card profile-head">
      <div id="profileAvatar" class="avatar xl">U</div>
      <div>
        <h1 id="userName">未登录</h1>
        <p id="userBio" class="muted">登录后可以查看当前用户接口返回的数据。</p>
        <div class="profile-stats">
          <div><strong id="profileUserId">-</strong><span>用户 ID</span></div>
          <div><strong id="profileUsername">-</strong><span>用户名</span></div>
          <div><strong id="profileEmail">-</strong><span>邮箱</span></div>
        </div>
      </div>
    </section>

    <section class="card profile-content">
      <h2>当前阶段说明</h2>
      <div id="myPosts" class="feed"></div>
      <p id="profileMessage" class="page-message"></p>
    </section>
  </main>

  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/profile.js"></script>
</body>
</html>
